<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Trader Journal PRO</title>

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#0f172a">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <header>

      📊 Trader Journal PRO

    </header>

    <div class="card">

      💵 Banca Inicial<br>

      <input type="number"
             id="initialBalanceInput">

      <button onclick="setInitialBalance()">

        Salvar

      </button>

    </div>

    <div class="card">

      Gerenciamento de Risco<br>

      <input type="number"
             id="riskPercentInput"
             placeholder="% de risco">

      <button onclick="calculateRisk()">

        Calcular Risco

      </button>

      <p>

        Valor máximo por trade:

        <strong id="riskResult">

          R$ 0.00

        </strong>

      </p>

    </div>

    <div class="card">

      💰 Depositar<br>

      <input type="number"
             id="depositInput">

      <button onclick="deposit()">

        Adicionar

      </button>

    </div>

    <div class="card">

      💸 Sacar<br>

      <input type="number"
             id="withdrawInput">

      <button onclick="withdraw()">

        Sacar

      </button>

    </div>

    <div class="card">

      🎯 Meta Mensal<br>

      <input type="number"
             id="goalInput">

      <button onclick="setMonthlyGoal()">

        Salvar

      </button>

      <div class="progress-bar">

        <div class="progress-fill"
             id="goalBar"></div>

      </div>

    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <!-- TOP STATS -->

    <div class="top-stats">

      <div class="stat-card">

        <div class="stat-title">

          🏦 Banca Atual

        </div>

        <div class="stat-value">

          R$
          <span id="currentBalance">

            0

          </span>

        </div>

      </div>

      <div class="stat-card">

        <div class="stat-title">

          📈 Crescimento

        </div>

        <div class="stat-value success-text">

          <span id="growthPercent">

            0%

          </span>

        </div>

      </div>

      <div class="stat-card">

        <div class="stat-title">

          🎯 Meta Atingida

        </div>

        <div class="stat-value primary-text">

    <span id="goalPercent">

      0%

    </span>

        </div>

        <div class="meta-progress">

          <div
                  class="meta-progress-fill"
                  id="goalProgressBar">
          </div>

        </div>

      </div>

    </div>

    <!-- CONTROLES -->

    <div class="controls">

      <button onclick="changeMonth(-1)">

        ⬅

      </button>

      <span id="monthYear"></span>

      <button onclick="changeMonth(1)">

        ➡

      </button>

    </div>

    <!-- CALENDÁRIO -->

    <div class="calendar"
         id="calendar"></div>

    <!-- STATS -->

    <div class="controls"
         style="margin-top:20px;">

      <div>

        ✅ Gains:
        <span id="gains">0</span>

      </div>

      <div>

        ❌ Losses:
        <span id="losses">0</span>

      </div>

      <div>

        💰 Lucro do Mês:
        R$
        <span id="saldo">0</span>

      </div>

      <div>

        📊 Winrate:
        <span id="winrate">0%</span>

      </div>

    </div>

    <!-- CHART -->

    <div class="chart-card">

      <div class="chart-header">

        <h2>

          📈 Evolução da Banca

        </h2>

        <span>

          Performance mensal

        </span>

      </div>

      <div class="chart-container">

        <canvas id="chart"></canvas>

      </div>

    </div>

  </div>

</div>

<script>

  if ("serviceWorker" in navigator) {

    navigator.serviceWorker
      .register("service-worker.js");

  }

</script>

<script src="script.js"></script>

</body>
</html>
